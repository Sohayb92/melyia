<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Mélyia · connexion Google</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0A84FF">
  <style>
    html, body {
      margin: 0; padding: 0; min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
      background: #FAFAFA; color: #0A0A0B;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #fff; border-radius: 16px; padding: 40px 32px;
      box-shadow: 0 4px 30px rgba(0,0,0,0.05);
      max-width: 420px; width: calc(100% - 32px); text-align: center;
    }
    h1 { font-size: 22px; margin: 0 0 12px; }
    p { font-size: 14px; color: #6B7280; line-height: 1.5; margin: 8px 0; }
    .spinner {
      width: 36px; height: 36px; border-radius: 50%;
      border: 3px solid #E5E7EB; border-top-color: #0A84FF;
      margin: 0 auto 24px; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .ok { color: #16A34A; }
    .err { color: #DC2626; }
    button {
      margin-top: 20px; padding: 10px 20px; border: none; border-radius: 10px;
      background: #0A84FF; color: #fff; font-size: 15px; font-weight: 500; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="spinner" id="spinner"></div>
    <h1 id="title">Connexion en cours…</h1>
    <p id="msg">Échange du code d'autorisation avec Google.</p>
  </div>

  <script>
    (async () => {
      const card = document.getElementById('card');
      const spinner = document.getElementById('spinner');
      const title = document.getElementById('title');
      const msg = document.getElementById('msg');

      const url = new URL(window.location.href);
      const code = url.searchParams.get('code');
      const state = url.searchParams.get('state');
      const error = url.searchParams.get('error');

      function done(text, sub, isError) {
        spinner.style.display = 'none';
        title.textContent = text;
        title.classList.add(isError ? 'err' : 'ok');
        msg.textContent = sub;
        const btn = document.createElement('button');
        btn.textContent = isError ? 'Retour' : 'Ouvrir Mélyia';
        btn.onclick = () => { window.location.href = '/'; };
        card.appendChild(btn);
      }

      if (error) {
        done('✗ Erreur', 'Google a retourné : ' + error, true);
        return;
      }
      if (!code) {
        done('✗ Code manquant', 'Pas de code d\'autorisation dans l\'URL.', true);
        return;
      }

      // Récupère les paramètres OAuth stockés par l'app principale avant le redirect
      const oauthState = JSON.parse(sessionStorage.getItem('melyia_oauth_pending') || 'null');
      if (!oauthState || oauthState.state !== state) {
        done('✗ État invalide', 'Protection CSRF : le state retourné ne correspond pas. Réessaie depuis Réglages.', true);
        return;
      }

      try {
        // Échange code → tokens
        const tokenResp = await fetch('https://oauth2.googleapis.com/token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({
            code,
            client_id: oauthState.clientId,
            client_secret: oauthState.clientSecret,
            redirect_uri: oauthState.redirectUri,
            grant_type: 'authorization_code',
            code_verifier: oauthState.verifier
          }).toString()
        });
        const tokens = await tokenResp.json();
        if (tokens.error) {
          done('✗ Erreur token', tokens.error_description || tokens.error, true);
          return;
        }

        // Fetch userinfo
        try {
          const infoResp = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
            headers: { 'Authorization': 'Bearer ' + tokens.access_token }
          });
          tokens.userinfo = await infoResp.json();
        } catch (e) {}

        // Calcule l'expiry absolue (epoch ms)
        const fullTokens = {
          access_token: tokens.access_token,
          refresh_token: tokens.refresh_token,
          expiry_date: Date.now() + ((tokens.expires_in || 3600) - 60) * 1000,
          token_type: tokens.token_type,
          scope: tokens.scope,
          userinfo: tokens.userinfo || null
        };
        localStorage.setItem('melyia_google_tokens', JSON.stringify(fullTokens));
        if (tokens.userinfo && tokens.userinfo.email) {
          localStorage.setItem('melyia_googleUserEmail', tokens.userinfo.email);
        }
        sessionStorage.removeItem('melyia_oauth_pending');

        done('✓ Connecté', 'Tu es connecté à Google. Redirection vers Mélyia…', false);
        setTimeout(() => { window.location.href = '/'; }, 1500);

      } catch (e) {
        done('✗ Erreur réseau', e.message || 'Échange du token a échoué.', true);
      }
    })();
  </script>
</body>
</html>
